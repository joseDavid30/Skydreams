<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDreams</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>✈️ Skydreams</h1>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Vuelos</a>
            <a href="#">Reservas</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Encuentra tu próximo destino</h2>
        <p>Viaja fácil, rápido y seguro</p>
        <button>Buscar vuelos</button>
    </section>

    <section class="cards">
        <div class="card">
            <h3>🌎 Destinos</h3>
            <p>Explora destinos nacionales e internacionales.</p>
        </div>

        <div class="card">
            <h3>💳 Pagos</h3>
            <p>Realiza pagos seguros en línea.</p>
        </div>

        <div class="card">
            <h3>📅 Reservas</h3>
            <p>Gestiona tus reservas fácilmente.</p>
        </div>
    </section>
    <script src="js/app.js"></script>
</body>
</html>
