<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Aerolínea - Panel Principal</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/admin.css">

    <!-- Fuente Inter (más elegante y pulida) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="d-flex min-vh-100">

        <!-- SIDEBAR -->
        <div class="sidebar bg-white border-end shadow-sm d-flex flex-column" style="width: 280px;">
            
            <div class="p-3 border-bottom">
                <div class="d-flex align-items-center gap-3">
                    <div class="logo-box logo-bg text-white d-flex align-items-center justify-content-center rounded-3" style="width: 38px; height: 38px; font-size: 28px;">
                        <i class="bi bi-airplane"></i>
                    </div>
                    <div>
                        <h4 class="mb-0 fw-bold">Admin Aerolínea</h4>
                        <small class="text-muted">Sistema de Gestión</small>
                    </div>
                </div>
            </div>

            <div class="flex-grow-1 overflow-auto px-3 py-3" id="sidebar-menu">
                
                
                <a href="#" class="active-menu d-flex align-items-center gap-3 px-4 py-3 rounded-3 mb-2">
                    <i class="bi bi-columns-gap fs-5"></i>
                    <span class="fw-semibold">Panel Principal</span>
                </a>

                <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                    <i class="bi bi-airplane fs-5"></i>
                    <span>Gestión de Vuelos</span>
                </a>
                <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                    <i class="bi bi-calendar-check fs-5"></i>
                    <span>Reservas</span>
                </a>
                <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                    <i class="bi bi-ticket-perforated fs-5"></i>
                    <span>Gestión de Boletos</span>
                </a>
                <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                    <i class="bi bi-box-seam fs-5"></i>
                    <span>Paquetes Turísticos</span>
                </a>
                <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                    <i class="bi bi-people fs-5"></i>
                    <span>Gestión de Clientes</span>
                </a>
                <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                    <i class="bi bi-person-gear fs-5"></i>
                    <span>Usuarios y Roles</span>
                </a>
        
                    <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none mb-1">
                        <i class="bi bi-geo-alt fs-5"></i>
                        <span>Ubicaciones</span>
                        <i class="bi bi-chevron-right ms-auto fs-6"></i>
                    </a>
                    <a href="#" class="menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark text-decoration-none">
                        <i class="bi bi-graph-up fs-5"></i>
                        <span>Reportes y Análisis</span>
                    </a>
                
            </div>
        </div>

        <div class="flex-grow-1 d-flex flex-column">

           
            <nav class="navbar navbar-light bg-white border-bottom px-4 py-2">
                <div class="container-fluid d-flex align-items-center">
                    
                   
                    <div class="flex-grow-1" style="max-width: 480px;">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-0">
                                <i class="bi bi-search text-secondary"></i>
                            </span>
                            <input type="text" class="form-control border-0 bg-light rounded-pill search-input" 
                                   placeholder="Buscar vuelos, reservas, clientes...">
                        </div>
                    </div>

                 
                    <div class="d-flex align-items-center gap-4 ms-auto">
                   
                        <div class="position-relative">
                            <i class="bi bi-bell fs-4"></i>
                            <span class="position-absolute top-0 start-100 translate-middle camp-bg rounded-circle border border-white" 
                            style="width: 9px; height: 9px;"></span>
                        </div>

                   
                        <div class="d-flex align-items-center gap-3">
                            <div class="text-end">
                                <small class="text-muted">Usuario Admin</small><br>
                                <strong class="text-dark">Administrador</strong>
                            </div>
                            <div class="avatar user-bg text-white rounded-circle d-flex align-items-center justify-content-center" style="width: 46px; height: 46px;">
                                <i class="bi bi-person"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

          
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
