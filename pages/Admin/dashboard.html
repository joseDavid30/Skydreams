<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Aerolínea - Panel Principal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/admin.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        .cursor-pointer { cursor: pointer; }
    </style>
</head>
<body>

    <div class="d-flex vh-100 overflow-hidden">

        <aside class="sidebar bg-white border-end shadow-sm d-flex flex-column flex-shrink-0">
            
            <div class="p-3 border-bottom">
                <div class="d-flex align-items-center gap-3">
                    <div class="logo-box bg-warning text-dark d-flex align-items-center justify-content-center rounded-3" 
                         style="width: 38px; height: 38px; font-size: 24px;">
                        <i class="bi bi-airplane"></i>
                    </div>
                    <div>
                        <h4 class="mb-0 fw-bold">SkyDreams</h4>
                        <small class="text-muted">Sistema de Gestión</small>
                    </div>
                </div>
            </div>

            <div class="flex-grow-1 overflow-y-auto px-3 py-3" id="sidebar-menu">
                <nav class="nav flex-column">
                    <a href="#" class="nav-link active-menu d-flex align-items-center gap-3 px-4 py-3 mb-1" data-page="dashboard">
                        <i class="bi bi-columns-gap fs-5"></i>
                        <span class="fw-semibold">Panel Principal</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1 solo-admin" data-page="vuelos">
                        <i class="bi bi-airplane fs-5"></i>
                        <span>Gestión de Vuelos</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1" data-page="reservas">
                        <i class="bi bi-calendar-check fs-5"></i>
                        <span>Reservas</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1" data-page="boletos">
                        <i class="bi bi-ticket-perforated fs-5"></i>
                        <span>Gestión de Asientos</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1 solo-admin" data-page="paquetes">
                        <i class="bi bi-box-seam fs-5"></i>
                        <span>Paquetes Turísticos</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1" data-page="clientes">
                        <i class="bi bi-people fs-5"></i>
                        <span>Gestión de Clientes</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1 solo-admin" data-page="usuarios">
                        <i class="bi bi-person-gear fs-5"></i>
                        <span>Usuarios y Roles</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark mb-1 solo-admin" data-page="ubicaciones">
                        <i class="bi bi-geo-alt fs-5"></i>
                        <span>Ubicaciones</span>
                    </a>

                    <a href="#" class="nav-link menu-item d-flex align-items-center gap-3 px-4 py-3 text-dark solo-admin" data-page="reportes">
                        <i class="bi bi-graph-up fs-5"></i>
                        <span>Reportes y Análisis</span>
                    </a>
                </nav>
            </div>
        </aside>
        
        <div class="flex-grow-1 d-flex flex-column overflow-hidden">

            <nav class="navbar navbar-light bg-white border-bottom px-4 py-2">
                <div class="container-fluid d-flex align-items-center">
                    
                    <div class="flex-grow-1" style="max-width: 480px;">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-0">
                                <i class="bi bi-search text-secondary"></i>
                            </span>
                            <input type="text" class="form-control border-0 bg-light rounded-pill search-input" 
                                   placeholder="Buscar vuelos, reservas, clientes...">
                        </div>
                    </div>

                    <div class="d-flex align-items-center gap-4 ms-auto">
                        <div class="position-relative cursor-pointer">
                            <i class="bi bi-bell fs-4"></i>
                            <span class="position-absolute top-0 start-100 translate-middle bg-danger rounded-circle border border-white" 
                                 style="width: 9px; height: 9px;"></span>
                        </div>

                        <div class="d-flex align-items-center gap-3">
                            <div class="text-end d-none d-sm-block">
                                <small class="text-muted" id="header-nombre">Cargando...</small><br>
                                <strong class="text-dark" id="header-rol">...</strong>
                            </div>
                            
                            <div class="dropdown">
                                <div class="avatar user-bg text-white rounded-circle d-flex align-items-center justify-content-center cursor-pointer" 
                                     style="width: 46px; height: 46px; background-color: #e67e22;" 
                                     data-bs-toggle="dropdown" aria-expanded="false" title="Opciones de cuenta">
                                    <i class="bi bi-person fs-4"></i>
                                </div>
                                
                                <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                                    <li>
                                        <button class="dropdown-item text-danger d-flex align-items-center gap-2 fw-medium" onclick="cerrarSesionAdmin()">
                                            <i class="bi bi-box-arrow-right fs-5"></i> Cerrar sesión
                                        </button>
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="flex-grow-1 overflow-y-auto bg-light p-4" id="main-content">
                <h2>Bienvenido al panel operativo</h2>
                <p>Selecciona una opción en el menú lateral para comenzar.</p>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../js/admin.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // 1. Leer datos de la sesión actual
            const usuarioLogueado = localStorage.getItem("usuarioLogueado");
            const rolUsuario = localStorage.getItem("rolUsuario");
            const nombreUsuario = localStorage.getItem("nombreUsuario");

            // 2. Verificar que el usuario tenga permisos corporativos
            if (usuarioLogueado !== "true" || !rolUsuario || (rolUsuario !== 'Súper Administrador' && rolUsuario !== 'Agente de Aerolínea')) {
                // Si es un cliente normal o alguien sin sesión, se expulsa al login
                window.location.href = "../login.html"; // Ajusta esta ruta según tus carpetas
                return;
            }

            // 3. Pintar los datos reales en la barra superior
            document.getElementById("header-nombre").innerText = nombreUsuario || "Usuario Interno";
            document.getElementById("header-rol").innerText = rolUsuario;

            // 4. LÓGICA DE OCULTAMIENTO PARA EL AGENTE DE AEROLÍNEA
            if (rolUsuario === 'Agente de Aerolínea') {
                const elementosProhibidos = document.querySelectorAll('.solo-admin');
                
                elementosProhibidos.forEach(elemento => {
                    // Le quitamos el d-flex que lo mantiene visible a la fuerza
                    elemento.classList.remove('d-flex');
                    // Le ponemos d-none (display: none !important en Bootstrap) para ocultarlo definitivamente
                    elemento.classList.add('d-none'); 
                });
            }
        });

        // 5. Función para cerrar sesión desde el panel
        function cerrarSesionAdmin() {
            localStorage.removeItem("usuarioLogueado");
            localStorage.removeItem("nombreUsuario");
            localStorage.removeItem("rolUsuario");
            localStorage.removeItem("ciudadUsuario");
            localStorage.removeItem("identificacionUsuario");
            
            window.location.href = "../login.html"; // Ajusta la ruta a tu login
        }
    </script>
</body>
</html>
