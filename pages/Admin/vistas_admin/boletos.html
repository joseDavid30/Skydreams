<div class="mb-4">
    <h2 class="fw-bold text-dark mb-1">Gestión de Boletos</h2>
    <p class="text-muted">Administra boletos de vuelo, asignación de asientos y mejoras de clase</p>
</div>

<div class="bg-white p-3 rounded-4 shadow-sm mb-4 border-0">
    <div class="input-group">
        <span class="input-group-text bg-light border-0 text-muted ps-4 pe-2 rounded-start-pill">
            <i class="bi bi-search"></i>
        </span>
        <input type="text" class="form-control bg-light border-0 py-2 rounded-end-pill" placeholder="Buscar por ID de boleto, reserva o pasajero..." aria-label="Buscar boletos">
    </div>
</div>

<div class="bg-white rounded-4 shadow-sm border-0 overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="tabla-boletos">
            <thead class="bg-light text-muted small fw-semibold text-uppercase">
                <tr>
                    <th class="ps-4 py-3">ID Boleto</th>
                    <th class="py-3">ID Reserva</th>
                    <th class="py-3">Nombre del Pasajero</th>
                    <th class="py-3">Número de Asiento</th>
                    <th class="py-3">Clase</th>
                    <th class="py-3">Precio</th>
                    <th class="pe-4 py-3 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody-boletos">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalEditarBoleto" tabindex="-1" aria-labelledby="modalBoletoTitle" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold mb-0" id="modalBoletoTitle">Editar Boleto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <form id="form-editar-boleto">
                    <input type="hidden" id="edit-bol-id">
                    
                    <div class="mb-3">
                        <label for="edit-bol-nombre" class="form-label fw-medium text-dark">Nombre del Pasajero</label>
                        <input type="text" class="form-control bg-light border-0" id="edit-bol-nombre" disabled>
                        <div class="form-text">El nombre está ligado a la reserva principal.</div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="edit-bol-asiento" class="form-label fw-medium text-dark">Número de Asiento</label>
                        <input type="text" class="form-control bg-light border-0" id="edit-bol-asiento" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="edit-bol-clase" class="form-label fw-medium text-dark">Clase</label>
                        <select class="form-select bg-light border-0" id="edit-bol-clase">
                            <option value="Económica">Económica</option>
                            <option value="Business">Business</option>
                            <option value="Primera Clase">Primera Clase</option>
                        </select>
                    </div>
                    
                    <div class="mb-4">
                        <label for="edit-bol-precio" class="form-label fw-medium text-dark">Precio ($)</label>
                        <input type="number" class="form-control bg-light border-0" id="edit-bol-precio" step="0.01" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary rounded-3 fw-medium px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white rounded-3 fw-medium px-4" id="btn-guardar-boleto" style="background-color: #d97706;">Guardar Cambios</button>
            </div>
        </div>
    </div>
</div>
