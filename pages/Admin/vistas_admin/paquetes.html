<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold text-dark mb-1">Paquetes Turísticos</h2>
        <p class="text-muted mb-0">Administra paquetes turísticos y experiencias de viaje</p>
    </div>
    <button class="btn text-white rounded-3 fw-medium px-4 py-2" style="background-color: #ea580c;" onclick="abrirModalCrearPaquete()">
        <i class="bi bi-plus-lg me-1"></i> Crear Paquete
    </button>
</div>

<div class="row g-4 w-100 m-0" id="contenedor-paquetes">
    </div>

<div class="modal fade" id="modalFormPaquete" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold mb-0" id="modalPaqueteTitle">Crear Nuevo Paquete Turístico</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <form id="form-paquete">
                    <input type="hidden" id="paq-id">
                    
                    <div class="mb-3">
                        <label for="paq-nombre" class="form-label fw-medium text-dark">Nombre del Paquete</label>
                        <input type="text" class="form-control bg-light border-0" id="paq-nombre" placeholder="ej., Explorador de Londres" required>
                    </div>
                    
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="paq-destino" class="form-label fw-medium text-dark">Destino</label>
                            <input type="text" class="form-control bg-light border-0" id="paq-destino" placeholder="ej., Londres, Reino Unido" required>
                        </div>
                        <div class="col-6">
                            <label for="paq-duracion" class="form-label fw-medium text-dark">Duración</label>
                            <input type="text" class="form-control bg-light border-0" id="paq-duracion" placeholder="ej., 5 días" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="paq-desc" class="form-label fw-medium text-dark">Descripción</label>
                        <textarea class="form-control bg-light border-0" id="paq-desc" rows="3" placeholder="Describe la experiencia del paquete..." required></textarea>
                    </div>
                    
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label for="paq-precio" class="form-label fw-medium text-dark">Precio ($)</label>
                            <input type="number" class="form-control bg-light border-0" id="paq-precio" step="0.01" required>
                        </div>
                        <div class="col-6">
                            <label for="paq-estado" class="form-label fw-medium text-dark">Estado</label>
                            <select class="form-select bg-light border-0" id="paq-estado">
                                <option value="Activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary rounded-3 fw-medium px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white rounded-3 fw-medium px-4" id="btn-guardar-paquete" style="background-color: #ea580c;">Crear Paquete</button>
            </div>
        </div>
    </div>
</div>
