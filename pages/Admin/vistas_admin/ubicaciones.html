<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold text-dark mb-1">Gestión de Ubicaciones</h2>
        <p class="text-muted mb-0">Administra países, departamentos y ciudades jerárquicamente</p>
    </div>
    <button class="btn text-white rounded-3 fw-medium px-4 py-2" style="background-color: #ea580c;" onclick="abrirModalPais()">
        <i class="bi bi-plus-lg me-1"></i> Agregar País
    </button>
</div>

<div class="bg-white rounded-4 shadow-sm border-0 p-2" id="contenedor-ubicaciones">
    </div>

<div class="modal fade" id="modalPais" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold mb-0">Agregar Nuevo País</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <form id="form-pais">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Nombre del País</label>
                        <input type="text" class="form-control bg-light border-0" id="pais-nombre" placeholder="ej., España" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium text-dark">Código del País</label>
                        <input type="text" class="form-control bg-light border-0" id="pais-codigo" placeholder="ej., ES" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary rounded-3 fw-medium px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white rounded-3 fw-medium px-4" id="btn-guardar-pais" style="background-color: #ea580c;">Agregar País</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalDepto" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold mb-0">Agregar Nuevo Departamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <form id="form-depto">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">País</label>
                        <select class="form-select bg-light border-0" id="depto-pais" required></select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium text-dark">Nombre del Departamento</label>
                        <input type="text" class="form-control bg-light border-0" id="depto-nombre" placeholder="ej., Comunidad de Madrid" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary rounded-3 fw-medium px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white rounded-3 fw-medium px-4" id="btn-guardar-depto" style="background-color: #ea580c;">Agregar Departamento</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalCiudad" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold mb-0">Agregar Nueva Ciudad</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <form id="form-ciudad">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">País</label>
                        <select class="form-select bg-light border-0" id="ciudad-pais" required></select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Departamento</label>
                        <select class="form-select bg-light border-0" id="ciudad-depto" required></select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium text-dark">Nombre de la Ciudad</label>
                        <input type="text" class="form-control bg-light border-0" id="ciudad-nombre" placeholder="ej., Madrid" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary rounded-3 fw-medium px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white rounded-3 fw-medium px-4" id="btn-guardar-ciudad" style="background-color: #ea580c;">Agregar Ciudad</button>
            </div>
        </div>
    </div>
</div>
