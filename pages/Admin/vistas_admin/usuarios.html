<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold text-dark mb-1">Usuarios y Roles</h2>
        <p class="text-muted mb-0">Administra usuarios del sistema, roles y permisos</p>
    </div>
    <button class="btn text-white rounded-3 fw-medium px-4 py-2" style="background-color: #ea580c;" onclick="abrirModalUsuario()">
        <i class="bi bi-plus-lg me-1"></i> Crear Usuario
    </button>
</div>

<div class="row g-4 mb-4">
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 p-3 flex-row align-items-center gap-3">
            <div class="bg-warning bg-opacity-10 text-warning p-3 rounded-3 fs-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                <i class="bi bi-shield"></i>
            </div>
            <div>
                <p class="text-muted small mb-0">Administradores</p>
                <h3 class="fw-bold mb-0 text-dark" id="count-admins">0</h3>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 p-3 flex-row align-items-center gap-3">
            <div class="bg-warning bg-opacity-10 text-warning p-3 rounded-3 fs-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                <i class="bi bi-person-gear"></i>
            </div>
            <div>
                <p class="text-muted small mb-0">Agentes</p>
                <h3 class="fw-bold mb-0 text-dark" id="count-agentes">0</h3>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card border-0 shadow-sm rounded-4 h-100 p-3 flex-row align-items-center gap-3">
            <div class="bg-light text-secondary p-3 rounded-3 fs-3 d-flex align-items-center justify-content-center" style="width: 60px; height: 60px;">
                <i class="bi bi-person"></i>
            </div>
            <div>
                <p class="text-muted small mb-0">Clientes</p>
                <h3 class="fw-bold mb-0 text-dark" id="count-clientes">0</h3>
            </div>
        </div>
    </div>
</div>

<div class="bg-white rounded-4 shadow-sm border-0 overflow-hidden">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="tabla-usuarios">
            <thead class="bg-light text-muted small fw-semibold text-uppercase">
                <tr>
                    <th class="ps-4 py-3">ID Usuario</th>
                    <th class="py-3">Nombre de Usuario</th>
                    <th class="py-3">Email</th>
                    <th class="py-3">Rol</th>
                    <th class="py-3 text-center">Cliente Asociado</th>
                    <th class="py-3 text-center">Estado</th>
                    <th class="pe-4 py-3 text-end">Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody-usuarios">
                </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="modalCrearUsuario" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-4">
            <div class="modal-header border-0 pb-0 pt-4 px-4">
                <h5 class="fw-bold mb-0">Crear Nuevo Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body px-4 pt-4">
                <form id="form-usuario">
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Nombre de Usuario</label>
                        <input type="text" class="form-control bg-light border-0" id="user-username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Email</label>
                        <input type="email" class="form-control bg-light border-0" id="user-email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Rol</label>
                        <select class="form-select bg-light border-0" id="user-rol">
                            <option value="Administrador">Administrador</option>
                            <option value="Agente">Agente</option>
                            <option value="Cliente">Cliente</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium text-dark">Cliente Asociado (Opcional)</label>
                        <input type="number" class="form-control bg-light border-0" id="user-cliente-id" placeholder="Ej: 1 (ID numérico del cliente)">
                        <div class="form-text small">Solo requerido si el rol es 'Cliente'.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium text-dark">Contraseña</label>
                        <input type="password" class="form-control bg-light border-0" id="user-pass" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 p-4 pt-0 gap-2">
                <button type="button" class="btn btn-outline-secondary rounded-3 fw-medium px-4" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn text-white rounded-3 fw-medium px-4" id="btn-guardar-usuario" style="background-color: #ea580c;">Crear Usuario</button>
            </div>
        </div>
    </div>
</div>
