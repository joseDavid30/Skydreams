<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | SkyDreams Travel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/index.css">

    <style>
        body {
            background:
                linear-gradient(rgba(10, 20, 40, 0.88), rgba(10, 20, 40, 0.92)),
                url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;

            min-height: 100vh;
        }

        .login-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 60px;
        }

        .login-card {
            background: rgba(17, 25, 40, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 45px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
        }

        .login-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
        }

        .login-subtitle {
            color: #b8c7db;
        }

        .form-label {
            color: #d6e2f1;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-group-text {
            background-color: #2c3e50 !important;
            border: none !important;
            color: #f5c400;
            border-radius: 14px 0 0 14px;
        }

        .form-control {
            background-color: #2c3e50 !important;
            border: none !important;
            color: white !important;
            height: 58px;
            border-radius: 0 14px 14px 0 !important;
        }

        .form-control::placeholder {
            color: #9fb3c8;
        }

        .btn-login {
            background-color: #f5c400;
            color: #0a1428;
            font-weight: 700;
            border: none;
            height: 58px;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            background-color: #ffd700;
            transform: translateY(-3px);
        }

        .login-extra {
            color: #b8c7db;
        }

        .login-extra a {
            color: #f5c400;
            text-decoration: none;
        }

        .demo-box {
            background-color: rgba(245, 196, 0, 0.08);
            border: 1px solid rgba(245, 196, 0, 0.25);
            border-radius: 16px;
            padding: 20px;
        }

        .demo-box h6 {
            color: #f5c400;
            font-weight: 700;
        }

        .demo-box p {
            color: white;
            margin-bottom: 8px;
        }

        .error-message {
            display: none;
            background-color: rgba(255, 0, 0, 0.1);
            color: #ffb3b3;
            border: 1px solid rgba(255, 0, 0, 0.25);
            padding: 14px;
            border-radius: 14px;
            text-align: center;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary sticky-top">
        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="../index.html">

                <div class="bg-warning text-dark rounded-3 d-flex align-items-center justify-content-center me-3"
                    style="width: 50px; height: 50px;">

                    <i class="bi bi-airplane" style="font-size: 2.1rem;"></i>

                </div>

                <div class="d-flex flex-column justify-content-center" style="line-height: 1.1;">

                    <span class="fw-bold fs-4 text-white">
                        SkyDreams Travel
                    </span>

                    <small class="text-warning fw-medium" style="font-size: 0.95rem;">
                        Tu viaje, nuestra pasión
                    </small>

                </div>
            </a>

            <div class="d-flex gap-2">

                <a href="../index.html" class="btn btn-outline-light rounded-pill px-4">
                    Volver al inicio
                </a>

                <a href="registro.html" class="btn btn-warning rounded-pill px-4 fw-semibold">
                    Registrarse
                </a>

            </div>
        </div>
    </nav>

    <section class="login-section">

        <div class="login-card">

            <div class="text-center mb-5">

                <div class="d-inline-flex align-items-center justify-content-center bg-warning text-dark rounded-circle mb-4"
                    style="width: 85px; height: 85px;">

                    <i class="bi bi-person-fill" style="font-size: 2.8rem;"></i>

                </div>

                <h1 class="login-title mb-3">
                    Bienvenido
                </h1>

                <p class="login-subtitle fs-5">
                    Inicia sesión y continúa explorando el mundo con SkyDreams.
                </p>

            </div>

            <form id="loginForm">

                <div class="mb-4">
                    <label class="form-label">Correo electrónico</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>

                        <input type="email" id="email" class="form-control" placeholder="Ingresa tu correo" required>

                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Contraseña</label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña"
                            required>

                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 login-extra">

                    <div>
                        <input type="checkbox" class="form-check-input me-2">
                        Recordarme
                    </div>

                    <a href="#">
                        ¿Olvidaste tu contraseña?
                    </a>

                </div>

                <button type="submit" class="btn btn-login w-100 fs-5 mb-4">
                    Iniciar Sesión
                </button>

                <div class="error-message" id="errorMessage">
                    Correo o contraseña incorrectos.
                </div>

            </form>



        </div>

    </section>

<script>
        const formulario = document.getElementById("loginForm");

        formulario.addEventListener("submit", async function (event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                // Consultamos la base de datos real
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Si coincide, guardamos sesión y volvemos al Home
                    localStorage.setItem("usuarioLogueado", "true");
                    localStorage.setItem("nombreUsuario", data.user.username);
                    window.location.href = "../index.html";
                } else {
                    // Mostramos la alerta de error si no coincide
                    document.getElementById("errorMessage").style.display = "block";
                }
            } catch (error) {
                console.error("Error conectando al backend:", error);
                alert("Error de conexión con el servidor");
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

<script>

    const usuarioLogueado = localStorage.getItem("usuarioLogueado");

    const navbarArea = document.getElementById("navbar-user-area");

    if (usuarioLogueado === "true") {

        navbarArea.innerHTML = 

            <div class="dropdown">

                <button class="btn btn-warning rounded-pill px-3 dropdown-toggle fw-semibold"
                    data-bs-toggle="dropdown">

                    <i class="bi bi-person-circle me-2"></i>
                    Mi Perfil

                </button>

                <ul class="dropdown-menu dropdown-menu-end shadow border-0">

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-person me-2"></i>
                            Mi cuenta
                        </a>
                    </li>

                    <li>
                        <a class="dropdown-item" href="#">
                            <i class="bi bi-airplane me-2"></i>
                            Mis reservas
                        </a>
                    </li>

                    <li>
                        <hr class="dropdown-divider">
                    </li>

                    <li>
                        <button class="dropdown-item text-danger" onclick="cerrarSesion()">
                            <i class="bi bi-box-arrow-right me-2"></i>
                            Cerrar sesión
                        </button>
                    </li>

                </ul>

            </div>

        ;

    }

    function cerrarSesion() {

        localStorage.removeItem("usuarioLogueado");
        localStorage.removeItem("nombreUsuario");

        window.location.reload();

    }

</script>
