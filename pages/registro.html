<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registro | SkyDreams Travel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/index.css">

    <style>

        body {
            background-color: #0a1428;
            overflow-x: hidden;
        }

        .login-section {
            min-height: 100vh;

            background:
                linear-gradient(rgba(10, 20, 40, 0.82), rgba(10, 20, 40, 0.92)),
                url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?ixlib=rb-4.0.3&auto=format&fit=crop&q=80') center/cover no-repeat;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 120px 20px 80px;
        }

        .login-card {
            width: 100%;
            max-width: 540px;

            background: rgba(17, 25, 40, 0.72);

            border: 1px solid rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(18px);

            border-radius: 30px;

            padding: 55px 50px;

            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.55),
                0 0 40px rgba(245, 196, 0, 0.05);

            position: relative;

            overflow: hidden;
        }

        .login-card::before {
            content: "";

            position: absolute;

            top: -120px;
            right: -120px;

            width: 250px;
            height: 250px;

            background: rgba(245, 196, 0, 0.08);

            border-radius: 50%;

            filter: blur(20px);
        }

        .login-title {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }

        .login-subtitle {
            color: #9fb3c8;
            font-size: 1.05rem;
        }

        .form-label {
            color: #dce6f2;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .input-group {
            border-radius: 16px;
            overflow: hidden;
        }

        .input-group-text {
            background-color: #1d2a3d !important;
            border: none !important;
            color: #f5c400;
            padding-left: 18px;
            padding-right: 18px;
        }

        .form-control {
            background-color: #1d2a3d !important;

            border: none !important;

            color: white !important;

            height: 62px;

            font-size: 1rem;

            padding-left: 18px;

            transition: all 0.25s ease;
        }

        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(245, 196, 0, 0.18) !important;
        }

        .form-control::placeholder {
            color: #7f93ab;
        }

        .btn-login {
            height: 62px;

            border: none;

            border-radius: 50px;

            background: linear-gradient(135deg, #f5c400, #ffd700);

            color: #0a1428;

            font-size: 1.1rem;

            font-weight: 700;

            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-4px);

            box-shadow: 0 12px 25px rgba(245, 196, 0, 0.28);
        }

        .navbar {
            background-color: rgba(10, 20, 40, 0.88) !important;

            backdrop-filter: blur(10px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

    </style>

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">

        <div class="container">

            <a class="navbar-brand d-flex align-items-center" href="../index.html">

                <div class="bg-warning text-dark rounded-3 d-flex align-items-center justify-content-center me-3"
                    style="width: 50px; height: 50px;">

                    <i class="bi bi-airplane" style="font-size: 2.1rem;"></i>

                </div>

                <div class="d-flex flex-column justify-content-center" style="line-height: 1.1;">

                    <span class="fw-bold fs-4 text-white">
                        SkyDreams Travel
                    </span>

                    <small class="text-warning fw-medium" style="font-size: 0.95rem;">
                        Tu viaje, nuestra pasión
                    </small>

                </div>

            </a>

        </div>

    </nav>

    <section class="login-section">

        <div class="login-card">

            <div class="text-center mb-5">

                <div class="d-inline-flex align-items-center justify-content-center bg-warning text-dark rounded-circle mb-4"
                    style="width: 90px; height: 90px;">

                    <i class="bi bi-person-plus-fill" style="font-size: 2.8rem;"></i>

                </div>

                <h1 class="login-title mb-3">
                    Crear Cuenta
                </h1>

                <p class="login-subtitle">
                    Regístrate y comienza a descubrir destinos increíbles con SkyDreams.
                </p>

            </div>

            <form id="registroForm">

                <div class="mb-4">

                    <label class="form-label">
                        Correo electrónico
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-envelope-fill"></i>
                        </span>

                        <input type="email"
                            id="email"
                            class="form-control"
                            placeholder="Ingresa tu correo"
                            required>

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Número de celular
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-telephone-fill"></i>
                        </span>

                        <input type="tel"
                            id="telefono"
                            class="form-control"
                            placeholder="Ingresa tu número"
                            required>

                    </div>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Contraseña
                    </label>

                    <div class="input-group">

                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>

                        <input type="password"
                            id="password"
                            class="form-control"
                            placeholder="Crea una contraseña"
                            required>

                    </div>

                </div>

                <button type="submit" class="btn btn-login w-100 fs-5">
                    Crear Cuenta
                </button>

            </form>

        </div>

    </section>

    <script>

        const formulario = document.getElementById("registroForm");

        formulario.addEventListener("submit", function(event) {

            event.preventDefault();

            const email = document.getElementById("email").value;

            const telefono = document.getElementById("telefono").value;

            const password = document.getElementById("password").value;

            localStorage.setItem("usuarioRegistrado", email);

            localStorage.setItem("telefonoRegistrado", telefono);

            localStorage.setItem("passwordRegistrada", password);

            localStorage.setItem("usuarioLogueado", "true");

            localStorage.setItem("nombreUsuario", email);

            window.location.href = "../index.html";

        });

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
