<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDreams Travel - Reservas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/reservas.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top px-4">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-airplane-engines text-warning fs-2 me-2"></i>
                <div class="brand-text">
                    <span class="d-block fw-bold h4 mb-0 text-white">SkyDreams Travel</span>
                    <small class="text-warning" style="font-size: 0.7rem;">Tu viaje, nuestra pasión</small>
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="#">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link active text-warning mx-2" href="#">Reservas</a></li>
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="#">Ofertas</a></li>
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="#">Club VIP</a></li>
                    <li class="nav-item"><a class="nav-link text-white mx-2" href="#">Información</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <a href="#" class="btn btn-outline-light btn-sm border-secondary px-3">Iniciar Sesión</a>
                    <button class="btn btn-warning btn-sm fw-bold px-4 rounded-pill">Registrarse</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="main-container">
        
        <header class="row align-items-center my-3">
            <div class="col-md-8">
                <h1 class="display-4 fw-bold text-white mb-0">Reserva tu vuelo <span class="text-warning">AQUI!!!</span></h1>
                <p class="text-light mt-2 fs-5">Busca, compara y reserva tus próximos vuelos con las mejores tarifas y comodidades.</p>
            </div>
            <div class="col-md-4 text-md-end">
                <button class="btn btn-warning fw-bold px-4 py-2 shadow" onclick="verPaquetes()">
                    <i class="bi bi-box-seam me-2"></i> Ver Paquetes Turísticos
                </button>
            </div>
        </header>

        <section class="booking-box shadow-lg mb-3 p-4" id="seccion-buscador">
            <h5 class="text-white mb-4"><i class="bi bi-search text-warning me-2"></i> Buscador Avanzado de Vuelos</h5>
            <form action="resultados.html" method="GET" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label text-warning fw-bold small">ORIGEN</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-geo-alt"></i></span>
                        <input list="lista-lugares" name="origen" id="input-origen" class="form-control bg-transparent text-white border-secondary custom-placeholder" placeholder="¿Desde dónde viajas?" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-warning fw-bold small">DESTINO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-geo-fill"></i></span>
                        <input list="lista-lugares" name="destino" id="input-destino" class="form-control bg-transparent text-white border-secondary custom-placeholder" placeholder="¿A dónde vas?" required>
                    </div>
                </div>

                <datalist id="lista-lugares">
                    <option value="Bogotá, Colombia (BOG)">
                    <option value="Medellín, Colombia (MDE)">
                    <option value="Cali, Colombia (CLO)">
                    <option value="Cartagena, Colombia (CTG)">
                    <option value="Barranquilla, Colombia (BAQ)">
                    <option value="Miami, USA (MIA)">
                    <option value="Nueva York, USA (JFK)">
                    <option value="Madrid, España (MAD)">
                    <option value="Cancún, México (CUN)">
                    <option value="Tokio, Japón (NRT)">
                </datalist>

                <div class="col-md-2">
                    <label class="form-label text-warning fw-bold small">FECHA IDA</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-calendar-check"></i></span>
                        <input type="date" name="fecha-ida" class="form-control bg-transparent text-white border-secondary" required>
                    </div>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-warning fw-bold small">FECHA REGRESO</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-calendar-x"></i></span>
                        <input type="date" name="fecha-regreso" class="form-control bg-transparent text-white border-secondary" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label text-warning fw-bold small">PASAJEROS</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-people"></i></span>
                        <input type="number" name="pasajeros" class="form-control bg-transparent text-white border-secondary" value="1" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-warning fw-bold small">CLASE</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-secondary text-white"><i class="bi bi-star"></i></span>
                        <select name="clase" class="form-select bg-transparent text-white border-secondary">
                            <option class="bg-dark">Clase Económica</option>
                            <option class="bg-dark">Ejecutiva</option>
                            <option class="bg-dark">Primera Clase</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 shadow text-uppercase">Buscar vuelos</button>
                </div>
            </form>
        </section>
    </div>

    <script>
        function verPaquetes() {
            document.getElementById('seccion-ofertas').scrollIntoView({ behavior: 'smooth' });
        }

        // FUNCIONALIDAD: Rellena el destino y sube al buscador
        function reservarOferta(destinoSeleccionado) {
            // 1. Escribir el destino en el input correspondiente
            document.getElementById('input-destino').value = destinoSeleccionado;
            
            // 2. Hacer scroll suave hasta el buscador
            document.getElementById('seccion-buscador').scrollIntoView({ behavior: 'smooth' });
            
            // 3. Poner el foco en el primer campo (Origen) para que el usuario empiece a llenar
            document.getElementById('input-origen').focus();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
